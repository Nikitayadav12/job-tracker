<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Job Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .auth-shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .auth-art {
    background: linear-gradient(165deg, #150F28, #1A1430);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    border-right: 1px solid var(--border-soft);
    position: relative;
    overflow: hidden;
  }
  .auth-art img { width: 100%; max-width: 420px; }
  .auth-art .art-copy { text-align: center; max-width: 380px; margin-top: 8px; }
  .auth-art .art-copy h2 { font-size: 26px; margin-bottom: 10px; }
  .auth-art .art-copy p { color: var(--text-mid); font-size: 14.5px; line-height: 1.6; }

  .auth-form-side {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .auth-box { width: 100%; max-width: 380px; }
  .brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 36px;
  }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--primary-2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 700; color: white; font-size: 17px;
  }
  .brand-name { font-family: var(--font-display); font-weight: 600; font-size: 17px; letter-spacing: -0.01em; }

  .auth-box h1 { font-size: 28px; margin-bottom: 8px; }
  .auth-box .sub { color: var(--text-mid); font-size: 14.5px; margin-bottom: 28px; }
  form { display: flex; flex-direction: column; gap: 16px; }
  .auth-box .btn-primary { width: 100%; padding: 13px; margin-top: 4px; }
  .switch-line { margin-top: 22px; text-align: center; font-size: 13.5px; color: var(--text-mid); }
  .switch-line a { color: var(--accent-soft); font-weight: 600; }
  .switch-line a:hover { text-decoration: underline; }

  @media (max-width: 880px) {
    .auth-shell { grid-template-columns: 1fr; }
    .auth-art { display: none; }
  }
</style>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-art">
      <img src="illustration.svg" alt="" aria-hidden="true">
      <div class="art-copy">
        <h2>Every application, one pipeline.</h2>
        <p>Track status from Applied to Offer, keep notes on every recruiter call, and see your whole search at a glance.</p>
      </div>
    </div>

    <div class="auth-form-side">
      <div class="auth-box">
        <div class="brand">
          <div class="brand-mark">J</div>
          <div class="brand-name">Job Tracker</div>
        </div>

        <h1>Welcome back</h1>
        <p class="sub">Log in to pick up your job search where you left off.</p>

        <div class="error-banner" id="errorBanner"></div>

        <form id="loginForm">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary" id="submitBtn">
            <span id="btnLabel">Log in</span>
          </button>
        </form>

        <div class="switch-line">Don't have an account? <a href="register.html">Create one</a></div>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    if (Storage.getAccess()) window.location.href = "dashboard.html";

    const form = document.getElementById("loginForm");
    const errorBanner = document.getElementById("errorBanner");
    const submitBtn = document.getElementById("submitBtn");
    const btnLabel = document.getElementById("btnLabel");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError(errorBanner);
      submitBtn.disabled = true;
      btnLabel.innerHTML = '<span class="spinner"></span>';

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const data = await Api.login({ email, password });
        Storage.setTokens(data.access, data.refresh);
        window.location.href = "dashboard.html";
      } catch (err) {
        showError(errorBanner, err.message || "Couldn't log in. Check your details and try again.");
        submitBtn.disabled = false;
        btnLabel.textContent = "Log in";
      }
    });
  </script>
</body>
</html>
