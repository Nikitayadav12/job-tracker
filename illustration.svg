<svg viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#221A3D"/>
      <stop offset="100%" stop-color="#1A1430"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6D28D9" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="600" height="700" fill="none"/>
  <circle cx="300" cy="260" r="260" fill="url(#glow)"/>

  <!-- floating orbit ring -->
  <circle cx="300" cy="260" r="190" fill="none" stroke="#2D2450" stroke-width="1.5" stroke-dasharray="2 8" opacity="0.7"/>

  <!-- central card: resume/profile -->
  <g transform="translate(190,140)">
    <rect width="220" height="280" rx="20" fill="url(#g2)" stroke="#2D2450" stroke-width="1.5"/>
    <circle cx="110" cy="60" r="34" fill="url(#g1)"/>
    <rect x="80" y="106" width="60" height="10" rx="5" fill="#C4B5FD" opacity="0.9"/>
    <rect x="60" y="124" width="100" height="7" rx="3.5" fill="#756B96"/>

    <rect x="24" y="156" width="172" height="1" fill="#2D2450"/>

    <g opacity="0.95">
      <rect x="24" y="174" width="14" height="14" rx="4" fill="#34D399"/>
      <rect x="46" y="178" width="120" height="7" rx="3.5" fill="#B8AFD9"/>
    </g>
    <g opacity="0.95">
      <rect x="24" y="200" width="14" height="14" rx="4" fill="#A855F7"/>
      <rect x="46" y="204" width="100" height="7" rx="3.5" fill="#B8AFD9"/>
    </g>
    <g opacity="0.95">
      <rect x="24" y="226" width="14" height="14" rx="4" fill="#FBBF24"/>
      <rect x="46" y="230" width="130" height="7" rx="3.5" fill="#B8AFD9"/>
    </g>
  </g>

  <!-- floating status chips orbiting the card -->
  <g filter="url(#soft)" opacity="0.5">
    <rect x="60" y="90" width="90" height="34" rx="17" fill="#34D399"/>
    <rect x="430" y="150" width="110" height="34" rx="17" fill="#A855F7"/>
    <rect x="70" y="430" width="100" height="34" rx="17" fill="#FBBF24"/>
  </g>
  <g>
    <rect x="60" y="90" width="90" height="34" rx="17" fill="#1A1430" stroke="#34D399" stroke-width="1.5"/>
    <text x="105" y="111" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#34D399" text-anchor="middle">Offer</text>

    <rect x="430" y="150" width="120" height="34" rx="17" fill="#1A1430" stroke="#A855F7" stroke-width="1.5"/>
    <text x="490" y="171" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#A855F7" text-anchor="middle">Interview</text>

    <rect x="70" y="430" width="110" height="34" rx="17" fill="#1A1430" stroke="#FBBF24" stroke-width="1.5"/>
    <text x="125" y="451" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#FBBF24" text-anchor="middle">Screening</text>
  </g>

  <!-- connecting pipeline track at bottom -->
  <g transform="translate(80,540)">
    <line x1="0" y1="0" x2="440" y2="0" stroke="#2D2450" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="290" y2="0" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="7" fill="#34D399"/>
    <circle cx="110" cy="0" r="7" fill="#34D399"/>
    <circle cx="220" cy="0" r="7" fill="#A855F7"/>
    <circle cx="290" cy="0" r="9" fill="#A855F7" stroke="#0F0B1F" stroke-width="3"/>
    <circle cx="330" cy="0" r="7" fill="#2D2450"/>
    <circle cx="440" cy="0" r="7" fill="#2D2450"/>
  </g>

  <!-- floating dots / sparkle accents -->
  <circle cx="500" cy="80" r="4" fill="#A855F7" opacity="0.8"/>
  <circle cx="80" cy="200" r="3" fill="#C4B5FD" opacity="0.6"/>
  <circle cx="520" cy="420" r="5" fill="#34D399" opacity="0.6"/>
  <circle cx="40" cy="560" r="3" fill="#FBBF24" opacity="0.7"/>
</svg>
