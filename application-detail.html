<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application — Job Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="shell.css">
<style>
  .back-link {
    display: inline-flex; align-items: center; gap: 6px; color: var(--text-mid);
    font-size: 13.5px; margin-bottom: 18px; font-weight: 500;
  }
  .back-link:hover { color: var(--text-hi); }
  .back-link svg { width: 16px; height: 16px; }

  .detail-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
  .detail-title h1 { font-size: 26px; margin-bottom: 6px; }
  .detail-title .role { color: var(--text-mid); font-size: 15px; }
  .detail-actions { display: flex; gap: 10px; }

  .meta-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px;
  }
  .meta-card { padding: 16px 18px; }
  .meta-card .label { font-size: 12px; color: var(--text-low); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em; }
  .meta-card .value { font-size: 15px; font-weight: 600; }

  /* Status editor — same pipeline track signature, clickable */
  .status-card { padding: 26px 26px 30px; margin-bottom: 28px; }
  .status-card h3 { font-size: 16px; margin-bottom: 22px; }
  .status-track { position: relative; display: flex; justify-content: space-between; padding: 0 4px; }
  .status-track::before {
    content: ""; position: absolute; top: 16px; left: 4px; right: 4px; height: 3px;
    background: var(--border); border-radius: 2px;
  }
  .status-stage {
    position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center;
    gap: 12px; flex: 1; background: none; border: none; padding: 0;
  }
  .status-dot {
    width: 34px; height: 34px; border-radius: 50%; background: var(--bg-surface-2);
    border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
    color: var(--text-mid); transition: all 0.2s var(--ease);
  }
  .status-dot svg { width: 16px; height: 16px; }
  .status-stage:hover .status-dot { border-color: var(--accent-soft); }
  .status-stage.active .status-dot {
    border-color: var(--accent); color: white;
    background: linear-gradient(135deg, var(--primary-2), var(--accent));
    box-shadow: 0 0 0 5px rgba(168,85,247,0.18);
  }
  .status-stage[data-status="Rejected"].active .status-dot,
  .status-stage[data-status="Withdrawn"].active .status-dot {
    background: var(--bg-surface-2); border-color: var(--text-low); color: var(--danger); box-shadow: none;
  }
  .status-stage-label { font-size: 12.5px; color: var(--text-mid); font-weight: 500; }
  .status-stage.active .status-stage-label { color: var(--text-hi); font-weight: 600; }

  /* Notes */
  .notes-card { padding: 26px; }
  .notes-card h3 { font-size: 16px; margin-bottom: 18px; }
  .note-form { display: flex; gap: 10px; margin-bottom: 22px; }
  .note-form textarea { flex: 1; }
  .note-item {
    padding: 14px 0; border-bottom: 1px solid var(--border-soft);
    display: flex; justify-content: space-between; gap: 12px; align-items: flex-start;
  }
  .note-item:last-child { border-bottom: none; }
  .note-content { font-size: 14px; line-height: 1.55; flex: 1; }
  .note-date { font-size: 11.5px; color: var(--text-low); margin-top: 6px; }
  .note-delete { color: var(--text-low); background: none; border: none; padding: 4px; flex-shrink: 0; }
  .note-delete:hover { color: var(--danger); }
  .note-delete svg { width: 16px; height: 16px; }

  .empty-mini { padding: 24px 0; text-align: center; color: var(--text-low); font-size: 13.5px; }

  @media (max-width: 880px) {
    .meta-grid { grid-template-columns: 1fr 1fr; }
    .status-track { flex-wrap: wrap; gap: 18px 0; }
    .status-track::before { display: none; }
    .status-stage { flex: 0 0 33.333%; }
  }
  @media (max-width: 520px) {
    .meta-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="app-shell">
    <div id="sidebarMount"></div>

    <main class="main-content" id="mainContent">
      <a href="applications.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back to applications
      </a>

      <div id="contentMount">
        <div class="skeleton" style="height:80px;margin-bottom:20px"></div>
        <div class="skeleton" style="height:120px;margin-bottom:20px"></div>
        <div class="skeleton" style="height:160px"></div>
      </div>
    </main>
  </div>

  <script src="api.js"></script>
  <script src="sidebar.js"></script>
  <script>
    requireAuth();
    renderSidebar("applications");

    const STAGES = ["Applied", "Screening", "Interview", "Offer", "Rejected", "Withdrawn"];
    const STAGE_ICONS = {
      Applied: '<path d="M4 6h16M4 12h16M4 18h10" stroke-linecap="round"/>',
      Screening: '<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/>',
      Interview: '<path d="M21 11.5a8.5 8.5 0 1 1-3.8-7.1L21 3l-1.2 4.1A8.5 8.5 0 0 1 21 11.5z" stroke-linejoin="round"/>',
      Offer: '<path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/>',
      Rejected: '<path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>',
      Withdrawn: '<path d="M5 12h14" stroke-linecap="round"/>',
    };

    const params = new URLSearchParams(window.location.search);
    const appId = params.get("id");
    let currentApp = null;

    if (!appId) {
      window.location.href = "applications.html";
    }

    async function loadDetail() {
      try {
        const [app, notesRes] = await Promise.all([
          Api.getApplication(appId),
          Api.listNotes(appId),
        ]);
        currentApp = app;
        const notes = notesRes.results || notesRes;
        render(app, notes);
      } catch (err) {
        document.getElementById("contentMount").innerHTML = `
          <div class="card" style="padding:40px;text-align:center">
            <h3 style="margin-bottom:8px">Couldn't load this application</h3>
            <p style="color:var(--text-mid);font-size:14px">${escapeHtml(err.message || "")}</p>
          </div>`;
      }
    }

    function render(app, notes) {
      document.getElementById("contentMount").innerHTML = `
        <div class="detail-header">
          <div class="detail-title">
            <h1>${escapeHtml(app.company_name)}</h1>
            <p class="role">${escapeHtml(app.role_title)}</p>
          </div>
          <div class="detail-actions">
            <button class="btn btn-danger" id="deleteBtn">Delete</button>
          </div>
        </div>

        <div class="meta-grid">
          <div class="card meta-card"><div class="label">Location</div><div class="value">${escapeHtml(app.location || "—")}</div></div>
          <div class="card meta-card"><div class="label">Salary range</div><div class="value">${escapeHtml(app.salary_range || "—")}</div></div>
          <div class="card meta-card"><div class="label">Applied on</div><div class="value">${formatDate(app.created_at)}</div></div>
        </div>

        <div class="card status-card">
          <h3>Status</h3>
          <div class="status-track" id="statusTrack"></div>
        </div>

        <div class="card notes-card">
          <h3>Notes</h3>
          <form class="note-form" id="noteForm">
            <textarea id="noteInput" placeholder="Add a note — recruiter name, interview feedback, next steps…" rows="2" required></textarea>
            <button type="submit" class="btn btn-primary" id="noteSubmitBtn" style="align-self:flex-end">Add</button>
          </form>
          <div id="notesList"></div>
        </div>
      `;

      renderStatusTrack(app.status);
      renderNotes(notes);

      document.getElementById("deleteBtn").addEventListener("click", handleDelete);
      document.getElementById("noteForm").addEventListener("submit", handleAddNote);
    }

    function renderStatusTrack(activeStatus) {
      const track = document.getElementById("statusTrack");
      track.innerHTML = STAGES.map(stage => `
        <button type="button" class="status-stage ${stage === activeStatus ? "active" : ""}" data-status="${stage}">
          <div class="status-dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${STAGE_ICONS[stage]}</svg></div>
          <div class="status-stage-label">${stage}</div>
        </button>
      `).join("");

      track.querySelectorAll(".status-stage").forEach(btn => {
        btn.addEventListener("click", () => updateStatus(btn.dataset.status));
      });
    }

    async function updateStatus(newStatus) {
      if (newStatus === currentApp.status) return;
      try {
        const updated = await Api.updateApplication(appId, { status: newStatus });
        currentApp = updated;
        renderStatusTrack(updated.status);
        showToast(`Status updated to ${newStatus}.`);
      } catch (err) {
        showToast(err.message || "Couldn't update status.", "error");
      }
    }

    function renderNotes(notes) {
      const list = document.getElementById("notesList");
      if (!notes.length) {
        list.innerHTML = `<div class="empty-mini">No notes yet. Add one above.</div>`;
        return;
      }
      list.innerHTML = notes.map(note => `
        <div class="note-item" data-note-id="${note.id}">
          <div>
            <div class="note-content">${escapeHtml(note.content)}</div>
            <div class="note-date">${formatDate(note.created_at)}</div>
          </div>
          <button class="note-delete" data-id="${note.id}" title="Delete note">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0l-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      `).join("");

      list.querySelectorAll(".note-delete").forEach(btn => {
        btn.addEventListener("click", () => handleDeleteNote(btn.dataset.id));
      });
    }

    async function handleAddNote(e) {
      e.preventDefault();
      const input = document.getElementById("noteInput");
      const btn = document.getElementById("noteSubmitBtn");
      const content = input.value.trim();
      if (!content) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      try {
        await Api.addNote(appId, { content });
        input.value = "";
        const notesRes = await Api.listNotes(appId);
        renderNotes(notesRes.results || notesRes);
        showToast("Note added.");
      } catch (err) {
        showToast(err.message || "Couldn't add note.", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Add";
      }
    }

    async function handleDeleteNote(noteId) {
      if (!confirm("Delete this note?")) return;
      try {
        await Api.deleteNote(appId, noteId);
        const notesRes = await Api.listNotes(appId);
        renderNotes(notesRes.results || notesRes);
        showToast("Note deleted.");
      } catch (err) {
        showToast(err.message || "Couldn't delete note.", "error");
      }
    }

    async function handleDelete() {
      if (!confirm(`Delete the application to ${currentApp.company_name}? This can't be undone.`)) return;
      try {
        await Api.deleteApplication(appId);
        showToast("Application deleted.");
        window.location.href = "applications.html";
      } catch (err) {
        showToast(err.message || "Couldn't delete application.", "error");
      }
    }

    function formatDate(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      return d.toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str ?? "";
      return div.innerHTML;
    }

    loadDetail();
  </script>
</body>
</html>
