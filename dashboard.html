<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Job Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="shell.css">
<style>
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { padding: 20px; }
  .stat-card .label { font-size: 12.5px; color: var(--text-mid); margin-bottom: 10px; }
  .stat-card .value { font-family: var(--font-display); font-size: 30px; font-weight: 600; }
  .stat-card .value.accent { color: var(--accent-soft); }

  /* Signature: pipeline funnel */
  .pipeline-card { padding: 28px 28px 32px; margin-bottom: 28px; }
  .pipeline-card h3 { font-size: 16px; margin-bottom: 4px; }
  .pipeline-card .sub { color: var(--text-mid); font-size: 13px; margin-bottom: 26px; }
  .pipeline-track {
    position: relative;
    display: flex;
    justify-content: space-between;
    padding: 0 4px;
  }
  .pipeline-track::before {
    content: "";
    position: absolute;
    top: 16px; left: 4px; right: 4px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
  }
  .pipe-stage {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; flex: 1;
  }
  .pipe-dot {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--bg-surface-2);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 700; font-size: 13px;
    color: var(--text-mid);
    transition: all 0.3s var(--ease);
  }
  .pipe-stage.has-data .pipe-dot {
    border-color: var(--accent);
    color: white;
    background: linear-gradient(135deg, var(--primary-2), var(--accent));
    box-shadow: 0 0 0 4px rgba(168,85,247,0.15);
  }
  .pipe-stage[data-status="Rejected"].has-data .pipe-dot,
  .pipe-stage[data-status="Withdrawn"].has-data .pipe-dot {
    background: var(--bg-surface-2);
    border-color: var(--text-low);
    color: var(--text-mid);
    box-shadow: none;
  }
  .pipe-label { font-size: 12.5px; color: var(--text-mid); font-weight: 500; text-align: center; }
  .pipe-stage.has-data .pipe-label { color: var(--text-hi); }

  .panels { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
  .panel { padding: 22px; }
  .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .panel-head h3 { font-size: 15px; }
  .panel-head a { font-size: 13px; color: var(--accent-soft); font-weight: 600; }
  .panel-head a:hover { text-decoration: underline; }

  .recent-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid var(--border-soft);
  }
  .recent-row:last-child { border-bottom: none; }
  .recent-main { display: flex; flex-direction: column; gap: 3px; }
  .recent-main .company { font-size: 14px; font-weight: 600; }
  .recent-main .role { font-size: 12.5px; color: var(--text-mid); }

  .badge {
    font-size: 11.5px; font-weight: 600; padding: 4px 10px; border-radius: 100px;
    white-space: nowrap;
  }
  .badge-Applied { background: rgba(168,85,247,0.15); color: var(--accent-soft); }
  .badge-Screening { background: rgba(251,191,36,0.15); color: var(--warning); }
  .badge-Interview { background: rgba(109,40,217,0.18); color: #C9A8FF; }
  .badge-Offer { background: rgba(52,211,153,0.15); color: var(--success); }
  .badge-Rejected { background: rgba(251,113,133,0.15); color: var(--danger); }
  .badge-Withdrawn { background: rgba(117,107,150,0.2); color: var(--text-mid); }

  .empty-mini { padding: 30px 0; text-align: center; color: var(--text-low); font-size: 13.5px; }
  .quick-add-form { display: flex; flex-direction: column; gap: 12px; }
  .quick-add-form .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  @media (max-width: 980px) {
    .stat-row { grid-template-columns: repeat(2, 1fr); }
    .panels { grid-template-columns: 1fr; }
    .pipeline-track { flex-wrap: wrap; gap: 16px 0; }
    .pipeline-track::before { display: none; }
    .pipe-stage { flex: 0 0 33.333%; }
  }
</style>
</head>
<body>
  <div class="app-shell">
    <div id="sidebarMount"></div>

    <main class="main-content">
      <div class="page-header">
        <div>
          <h1>Dashboard</h1>
          <p class="sub">Here's where your job search stands right now.</p>
        </div>
        <a href="applications.html?new=1" class="btn btn-primary">+ Add application</a>
      </div>

      <div class="stat-row" id="statRow">
        <div class="card stat-card"><div class="label">Total applications</div><div class="skeleton" style="height:30px;width:60px"></div></div>
        <div class="card stat-card"><div class="label">Active</div><div class="skeleton" style="height:30px;width:60px"></div></div>
        <div class="card stat-card"><div class="label">Interviews</div><div class="skeleton" style="height:30px;width:60px"></div></div>
        <div class="card stat-card"><div class="label">Offers</div><div class="skeleton" style="height:30px;width:60px"></div></div>
      </div>

      <div class="card pipeline-card">
        <h3>Your pipeline</h3>
        <p class="sub">How many applications sit at each stage.</p>
        <div class="pipeline-track" id="pipelineTrack"></div>
      </div>

      <div class="panels">
        <div class="card panel">
          <div class="panel-head">
            <h3>Recent applications</h3>
            <a href="applications.html">View all</a>
          </div>
          <div id="recentList">
            <div class="skeleton" style="height:54px;margin-bottom:8px"></div>
            <div class="skeleton" style="height:54px;margin-bottom:8px"></div>
            <div class="skeleton" style="height:54px"></div>
          </div>
        </div>

        <div class="card panel">
          <div class="panel-head"><h3>Quick add</h3></div>
          <form class="quick-add-form" id="quickAddForm">
            <div class="error-banner" id="quickAddError"></div>
            <div class="field">
              <label for="qaCompany">Company</label>
              <input type="text" id="qaCompany" placeholder="e.g. Google" required>
            </div>
            <div class="field">
              <label for="qaRole">Role</label>
              <input type="text" id="qaRole" placeholder="e.g. Python Developer" required>
            </div>
            <div class="row2">
              <div class="field">
                <label for="qaStatus">Status</label>
                <select id="qaStatus">
                  <option value="Applied">Applied</option>
                  <option value="Screening">Screening</option>
                  <option value="Interview">Interview</option>
                  <option value="Offer">Offer</option>
                </select>
              </div>
              <div class="field">
                <label for="qaLocation">Location</label>
                <input type="text" id="qaLocation" placeholder="e.g. Pune">
              </div>
            </div>
            <button type="submit" class="btn btn-primary" id="qaSubmitBtn">Add application</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="api.js"></script>
  <script src="sidebar.js"></script>
  <script>
    requireAuth();
    renderSidebar("dashboard");

    const STAGES = ["Applied", "Screening", "Interview", "Offer", "Rejected", "Withdrawn"];

    async function loadDashboard() {
      try {
        const [summary, appsRes] = await Promise.all([
          Api.dashboardSummary(),
          Api.listApplications("?ordering=-created_at"),
        ]);
        renderStats(summary);
        renderPipeline(summary.by_status || {});
        const apps = appsRes.results || appsRes;
        renderRecent(apps.slice(0, 5));
      } catch (err) {
        showToast(err.message || "Couldn't load dashboard data.", "error");
        document.getElementById("recentList").innerHTML = `<div class="empty-mini">Couldn't load data. <a href="dashboard.html" style="color:var(--accent-soft)">Retry</a></div>`;
      }
    }

    function renderStats(summary) {
      const byStatus = summary.by_status || {};
      const total = summary.total ?? Object.values(byStatus).reduce((a, b) => a + b, 0);
      const active = (byStatus["Applied"] || 0) + (byStatus["Screening"] || 0) + (byStatus["Interview"] || 0);
      const interviews = byStatus["Interview"] || 0;
      const offers = byStatus["Offer"] || 0;

      document.getElementById("statRow").innerHTML = `
        <div class="card stat-card"><div class="label">Total applications</div><div class="value">${total}</div></div>
        <div class="card stat-card"><div class="label">Active</div><div class="value">${active}</div></div>
        <div class="card stat-card"><div class="label">Interviews</div><div class="value">${interviews}</div></div>
        <div class="card stat-card"><div class="label">Offers</div><div class="value accent">${offers}</div></div>
      `;
    }

    function renderPipeline(byStatus) {
      const track = document.getElementById("pipelineTrack");
      track.innerHTML = STAGES.map(stage => {
        const count = byStatus[stage] || 0;
        return `
          <div class="pipe-stage ${count > 0 ? "has-data" : ""}" data-status="${stage}">
            <div class="pipe-dot">${count}</div>
            <div class="pipe-label">${stage}</div>
          </div>
        `;
      }).join("");
    }

    function renderRecent(apps) {
      const list = document.getElementById("recentList");
      if (!apps.length) {
        list.innerHTML = `<div class="empty-mini">No applications yet. Add your first one with Quick add →</div>`;
        return;
      }
      list.innerHTML = apps.map(app => `
        <a href="application-detail.html?id=${app.id}" style="display:block;color:inherit">
          <div class="recent-row">
            <div class="recent-main">
              <div class="company">${escapeHtml(app.company_name)}</div>
              <div class="role">${escapeHtml(app.role_title)}</div>
            </div>
            <span class="badge badge-${app.status}">${app.status}</span>
          </div>
        </a>
      `).join("");
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str ?? "";
      return div.innerHTML;
    }

    document.getElementById("quickAddForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("quickAddError");
      hideError(errEl);
      const btn = document.getElementById("qaSubmitBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      const payload = {
        company_name: document.getElementById("qaCompany").value.trim(),
        role_title: document.getElementById("qaRole").value.trim(),
        status: document.getElementById("qaStatus").value,
        location: document.getElementById("qaLocation").value.trim(),
      };

      try {
        await Api.createApplication(payload);
        showToast("Application added.");
        document.getElementById("quickAddForm").reset();
        loadDashboard();
      } catch (err) {
        showError(errEl, err.message || "Couldn't add application.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Add application";
      }
    });

    loadDashboard();
  </script>
</body>
</html>
